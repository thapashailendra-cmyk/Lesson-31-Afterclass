<!DOCTYPE html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />
<!-- My CSS -->
<link rel="stylesheet" href="socialmedia.css" />
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Barlow+TT:ital,wght@0,400;0,700;0,800;0,900;1,400&display=swap"
rel="stylesheet" />
<title>Social Media Section</title>
</head>
<body>
    <!-- Social Media Section -->
    <div id="social-media" class="container-fluid">
        <div class="container text-white py-5">
            <h4 class="text-warning">Social Media of Our Company</h4>
            <h1 class="m-heading">Let's be friends</h1>
            <div class="row pt-5">
                 <div class="col-3 media_link btn" href="https://www.youtube.com">
                    <div class="row">
                        <div class="col-6 d-flex justify-content-start">
                            <h3 class="m-0 pt-2 text-white">Youtube</h3>
                        </div>
                        <div class="col-6 d-flex justify-content-end align-items-center">
                            <i class="fab fa-youtube fa-2x text-secondary"></i>
                        </div>
                    </div>
                </div>
                 <div class="col-3 media_link btn" href="https://www.facebook.com">
                    <div class="row">
                        <div class="col-6 d-flex justify-content-start">
                            <h3 class="m-0 pt-2 text-white">Facebook</h3>
                        </div>
                        <div class="col-6 d-flex justify-content-end align-items-center">
                            <i class="fab fa-facebook-f fa-2x text-secondary"></i>
                        </div>
                    </div>
                </div>
                 <div class="col-3 media_link btn" href="https://www.tiktok.com">
                    <div class="row">
                        <div class="col-6 d-flex justify-content-start">
                            <h3 class="m-0 pt-2 text-white"></h3>
                        </div>
                        <div class="col-6 d-flex justify-content-end align-items-center">
                            <i class="fab fa-linkedin-in fa-2x text-secondary"></i>
                        </div>
                    </div>
                </div>
                <div class="col-3 media_link btn" href="https://www.instagram.com">
                    <div class="row">
                        <div class="col-6 d-flex justify-content-start">
                            <h3 class="m-0 pt-2 text-white">Instagram</h3>
                        </div>
                        <div class="col-6 d-flex justify-content-end align-items-center">
                            <i class="fab fa-instagram fa-2x text-secondary"></i>
                        </div>
                    </div>
                </div>
                </div>
                </div>
                </div>
                </body>
                </html>
